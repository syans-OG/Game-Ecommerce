<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Game Ecommerce</title>
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="icon" href="../asset/logo.png" type="image/png">
    <link rel="stylesheet" href="../css/loader.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>

<body>


    <nav class="glass-nav">
        <div class="nav-logo" onclick="window.location.href='index.html'">
            <img src="../asset/logo.png" alt="Aether Logo" style="height: 48px; width: auto;">
            <span>Aether</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Back to Home</a></li>
        </ul>
    </nav>


    <div class="auth-container">

        <div class="auth-hero-box">
            <h1 class="hero-title">Welcome Back</h1>
            <p class="hero-subtitle">Enter your credentials to access your library.</p>

            <form id="loginForm" class="auth-form">


                <div class="hero-input-group">
                    <input type="text" id="identifier" class="hero-input" placeholder=" " required>
                    <label for="identifier" class="hero-label">Email or Username</label>
                </div>


                <div class="hero-input-group">
                    <input type="password" id="password" class="hero-input" placeholder=" " required>
                    <label for="password" class="hero-label">Password</label>
                </div>


                <div class="form-footer" style="margin-bottom: 20px;">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: #ccc;">
                        <input type="checkbox" id="rememberMe" style="accent-color: var(--amber);"> Remember me
                    </label>
                    <a href="#" class="hero-link" style="font-size: 0.85rem;"
                        onclick="alert('Reset link sent (simulation).')">Forgot Password?</a>
                </div>


                <div id="messageBox" class="message-box"></div>


                <button type="submit" id="submitBtn" class="btn-hero-auth">
                    <span class="btn-text">Log In</span>
                </button>
            </form>

            <div class="hero-footer">
                Don't have an account? <a href="register.html" class="hero-link">Join Now</a>
            </div>
        </div>
    </div>



    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>

    <script src="../js/auth_config.js"></script>
    <script src="../js/loader.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/bg_spotlight.js"></script>
    <script>

        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = submitBtn.querySelector('.btn-text');
        const messageBox = document.getElementById('messageBox');


        function setButtonState(state, text = '') {
            submitBtn.className = 'btn-hero-auth';
            submitBtn.classList.add(state);

            if (state === 'loading') {
                btnText.style.opacity = '0';
            } else if (state === 'success') {
                btnText.style.opacity = '1';
                btnText.textContent = text || 'Success';
            } else {
                btnText.style.opacity = '1';
                btnText.textContent = text || 'Log In';
            }
        }


        function showMessage(type, text) {
            messageBox.className = `message-box ${type}`;
            messageBox.textContent = text;
        }


        form.addEventListener('submit', async function (e) {
            e.preventDefault();


            messageBox.style.display = 'none';
            setButtonState('loading');


            await new Promise(resolve => setTimeout(resolve, 1500));


            const identifier = document.getElementById('identifier').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            const result = AuthService.login(identifier, password, rememberMe);

            if (result.success) {

                setButtonState('success', 'Welcome Back!');
                showMessage('success', result.message);


                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } else {

                setButtonState('error', 'Try Again');
                showMessage('error', result.message);


                setTimeout(() => {
                    setButtonState('', 'Log In');
                }, 2000);
            }
        });


        if (AuthService.getCurrentUser()) {
            window.location.href = 'index.html';
        }


        window.addEventListener('load', () => {
            if (window.appLoader) window.appLoader.hide();
        });
    </script>
</body>

</html>
