<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Game Ecommerce</title>
    <link rel="icon" href="asset/logo.png" type="image/png">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/loader.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>


    <nav class="glass-nav">
        <div class="nav-logo" onclick="window.location.href='index.html'">
            <img src="asset/logo.png" alt="Aether Logo" style="height: 48px; width: auto;">
            <span>Aether</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Back to Home</a></li>
        </ul>
    </nav>


    <div class="auth-container">

        <div class="auth-hero-box">
            <h1 class="hero-title">Join the Waitlist</h1>
            <p class="hero-subtitle">Create your account to start your journey.</p>

            <form id="registerForm" class="auth-form">


                <div class="hero-input-group">
                    <input type="text" id="username" class="hero-input" placeholder=" " required>
                    <label for="username" class="hero-label">Choose Username</label>
                </div>


                <div class="hero-input-group">
                    <input type="email" id="email" class="hero-input" placeholder=" " required>
                    <label for="email" class="hero-label">Email Address</label>
                </div>


                <div class="hero-input-group">
                    <input type="password" id="password" class="hero-input" placeholder=" " required>
                    <label for="password" class="hero-label">Create Password</label>
                    <div class="input-helper">Min 8 chars, 1 uppercase, 1 number</div>
                </div>


                <div class="hero-input-group">
                    <input type="password" id="confirmPassword" class="hero-input" placeholder=" " required>
                    <label for="confirmPassword" class="hero-label">Confirm Password</label>
                </div>


                <div id="messageBox" class="message-box"></div>


                <button type="submit" id="submitBtn" class="btn-hero-auth">
                    <span class="btn-text">Start Adventure</span>
                </button>
            </form>

            <div class="hero-footer">
                Already have an account? <a href="login.html" class="hero-link">Log In</a>
            </div>
        </div>
    </div>



    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>

    <script src="js/auth_config.js"></script>
    <script src="js/loader.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/bg_spotlight.js"></script>
    <script>

        const form = document.getElementById('registerForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = submitBtn.querySelector('.btn-text');
        const messageBox = document.getElementById('messageBox');


        function setButtonState(state, text = '') {
            submitBtn.className = 'btn-hero-auth';
            submitBtn.classList.add(state);

            if (state === 'loading') {
                btnText.style.opacity = '0';
            } else if (state === 'success') {
                btnText.style.opacity = '1';
                btnText.textContent = text || 'Success';
            } else {
                btnText.style.opacity = '1';
                btnText.textContent = text || 'Start Adventure';
            }
        }


        function showMessage(type, text) {
            messageBox.className = `message-box ${type}`;
            messageBox.textContent = text;
        }


        form.addEventListener('submit', async function (e) {
            e.preventDefault();


            messageBox.style.display = 'none';
            setButtonState('loading');


            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                setButtonState('error', 'Mismatch');
                showMessage('error', "Passwords do not match.");
                setTimeout(() => setButtonState('', 'Start Adventure'), 2000);
                return;
            }


            await new Promise(resolve => setTimeout(resolve, 1500));

            const result = AuthService.register(username, email, password);

            if (result.success) {

                setButtonState('success', 'Account Created!');
                showMessage('success', result.message);


                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            } else {

                setButtonState('error', 'Error');
                showMessage('error', result.message);


                setTimeout(() => {
                    setButtonState('', 'Start Adventure');
                }, 2000);
            }
        });


        if (AuthService.getCurrentUser()) {
            window.location.href = 'index.html';
        }


        window.addEventListener('load', () => {
            if (window.appLoader) window.appLoader.hide();
        });
    </script>
</body>

</html>
